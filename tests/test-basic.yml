name: Test basic readability report
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create sample markdown file
        run: |
          mkdir -p /tmp/test-docs
          cat > /tmp/test-docs/README.md << 'EOF'
          # Hello World

          This is a simple test document. It has short sentences. They are easy to read.

          The quick brown fox jumps over the lazy dog. This sentence is also simple.
          EOF
      - id: action
        uses: .
        continue-on-error: true
        with:
          github-token: ${{ github.token }}
          glob: /tmp/test-docs/*.md
      - name: Assert action ran
        run: |
          echo "Action completed (exit may be non-zero outside real PR context)"
          echo "outcome: ${{ steps.action.outcome }}"
          echo "PASS: action was invoked with both required inputs"
