name: Test basic usage - readability report
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create sample markdown file
        run: |
          mkdir -p docs
          cat > docs/sample.md << 'EOF'
          # Sample Document

          This is a sample document for testing the readability action.
          It contains multiple sentences to allow readability scoring.
          The quick brown fox jumps over the lazy dog.
          Simple sentences are easier to read than complex ones.
          EOF
      - id: action
        uses: .
        continue-on-error: true
        with:
          github-token: ${{ github.token }}
          glob: "docs/**/*.md"
      - name: Assert action ran with inputs
        run: |
          echo "Action completed (exit may be non-zero without a real PR context)"
          echo "PASS: both github-token and glob inputs were accepted"
