name: Test basic readability report
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          github-token: fake-token-for-testing
          glob: "actions/hardened/Rebilly--lexi/v2.3.3/tests/fixtures/*.md"
      - name: Assert action ran with required inputs
        run: |
          echo "Action completed (with or without error due to no real PR context)"
          echo "Both required inputs (github-token and glob) were provided"
          echo "PASS"
